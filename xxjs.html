<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>潠等數呾け</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{display:flex;justify-content:center;align-items:center;height:100vh;background:#eee;}
        .calc{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px #ccc;}
        #input{width:100%;height:60px;font-size:24px;text-align:right;padding:10px;margin-bottom:10px;border:1px solid #ccc;}
        button{width:70px;height:70px;font-size:20px;border:none;border-radius:5px;margin:3px;cursor:pointer;background:#f5f5f5;}
        button:hover{background:#ddd;}
        .eq{background:#409eff;color:#fff;}
        .clear{background:#f56c6c;color:#fff;}
    </style>
</head>
<body>
    <div class="calc">
        <input type="text" id="input" readonly>
        <div>
            <button class="clear" onclick="clearNum()">C</button>
            <button onclick="addVal('/')">‾</button>
            <button onclick="addVal('*')">℅</button>
            <button onclick="addVal('-')">-</button>
        </div>
        <div>
            <button onclick="addVal('7')">7</button>
            <button onclick="addVal('8')">8</button>
            <button onclick="addVal('9')">9</button>
            <button onclick="addVal('+')">+</button>
        </div>
        <div>
            <button onclick="addVal('4')">4</button>
            <button onclick="addVal('5')">5</button>
            <button onclick="addVal('6')">6</button>
        </div>
        <div>
            <button onclick="addVal('1')">1</button>
            <button onclick="addVal('2')">2</button>
            <button onclick="addVal('3')">3</button>
        </div>
        <div>
            <button onclick="addVal('0')">0</button>
            <button onclick="addVal('.')">.</button>
            <button class="eq" onclick="calcNum()">=</button>
        </div>
    </div>

    <script>
        // 怀⻌杅趼睫瘍
        function addVal(val){
            document.getElementById('input').value += val;
        }
        // ラ諾
        function clearNum(){
            document.getElementById('input').value = '';
        }
        // 數呾賦彆
        function calcNum(){
            try{
                let res = eval(document.getElementById('input').value);
                document.getElementById('input').value = res;
            }catch{
                document.getElementById('input').value = '渣昫';
            }
        }
    </script>
</body>
</html>
